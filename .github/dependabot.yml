version: 2

# Watch the Jellyfin SDK for ABI surprises (incident: 10.11.9 silently removed
# IUserManager.Users, broke v1.12.0 on every 10.11.9+ server, only surfaced
# via user reports). With this in place, Dependabot opens a PR the day a new
# Jellyfin.Controller / Jellyfin.Model ships, CI runs the test suite against
# the new ABI, and a human decides whether to take the bump.
#
# FLOOR POLICY (issue #63): these PRs are a SIGNAL, not something to merge
# casually. Jellyfin assemblies carry full per-patch AssemblyVersions, so the
# SDK version we build against is the real minimum Jellyfin a release loads
# on. Merging an SDK bump = raising the floor = excluding users on older
# Jellyfin. Only take a bump when we actually need the new API, and raise
# targetAbi.txt + minor version in the same PR. version-gate.yml refuses
# any PR where the SDK version != targetAbi.txt, and any targetAbi change
# without a minor bump, and any PR without a version bump at all. Let the
# Dependabot PR sit open as a green/red compile signal otherwise.
#
# Scoped narrowly to Jellyfin.* for now; expand if other deps start causing
# surprises. PR commit prefix is "build" so pr-title.yml accepts it.

updates:
  - package-ecosystem: nuget
    directory: /LetterboxdSync
    schedule:
      interval: daily
    open-pull-requests-limit: 3
    allow:
      - dependency-name: "Jellyfin.*"
    commit-message:
      prefix: build
      include: scope
    labels:
      - dependencies
      - jellyfin-sdk

  # Tests project: same allowlist, lower frequency. Test-only dep bumps don't
  # ship to users, so weekly is plenty.
  - package-ecosystem: nuget
    directory: /LetterboxdSync.Tests
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    allow:
      - dependency-name: "Jellyfin.*"
    commit-message:
      prefix: build
      include: scope
    labels:
      - dependencies
      - jellyfin-sdk
